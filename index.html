<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Critty List</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#111;
    color:white;
}

header{
    background:#181818;
    padding:20px;
    text-align:center;
    border-bottom:3px solid #ff7b00;
}

h1{
    margin:0;
    color:#ff7b00;
}

nav{
    margin-top:10px;
}

nav button{
    padding:10px 20px;
    margin:5px;
    background:#ff7b00;
    border:none;
    color:white;
    cursor:pointer;
}

.page{
    display:none;
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.active{
    display:block;
}

.level-card{
    display:flex;
    background:#1d1d1d;
    margin-bottom:15px;
    border-radius:10px;
    overflow:hidden;
}

.level-card img{
    width:250px;
    object-fit:cover;
}

.level-info{
    padding:15px;
}

.rank{
    font-size:22px;
    color:#ff7b00;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:12px;
    border-bottom:1px solid #333;
    text-align:left;
}

th{
    background:#1d1d1d;
}
</style>
</head>
<body>

<header>
    <h1>Critty List</h1>
    <nav>
        <button onclick="showPage('list')">Demon List</button>
        <button onclick="showPage('stats')">Stats Viewer</button>
    </nav>
</header>

<div id="list" class="page active"></div>

<div id="stats" class="page">
    <h2>Stats Viewer</h2>

    <table>
        <thead>
            <tr>
                <th>Rank</th>
                <th>Player</th>
                <th>Points</th>
                <th>Demons</th>
            </tr>
        </thead>
        <tbody id="statsTable"></tbody>
    </table>
</div>

<script>

// DEMONLIST DATA
const demons = [
{
    rank: 1,
    name: "Critty Acheron",
    creator: "zZenithx",
    verifier: "zZenithx",
    youtube: "s343BTEFXgY"
},
{
    rank: 2,
    name: "Critty Tidal Wave",
    creator: "CaltanGMD",
    verifier: "CaltanGMD",
    youtube: "LicRIbOJ_HE"
},
{
    rank: 3,
    name: "Critty Uskc",
    creator: "zZenithx",
    verifier: "zZenithx",
    youtube: "LicRIbOJ_HE"
}
];

// STATS DATA
const players = [
{
    rank: 1,
    name: "zZenithx",
    points: 2875,
},
{
    rank: 2,
    name: "CaltanGMD",
    points: 1875,
}
];

function getThumbnail(videoID){
    return `https://img.youtube.com/vi/${videoID}/maxresdefault.jpg`;
}

function loadDemons(){

    const container = document.getElementById("list");
    container.innerHTML = "<h2>Demon List</h2>";

    demons.forEach(level=>{

        container.innerHTML += `
        <div class="level-card">
            <img src="${getThumbnail(level.youtube)}">
            <div class="level-info">
                <div class="rank">#${level.rank}</div>
                <h2>${level.name}</h2>
                <p><strong>Creator:</strong> ${level.creator}</p>
                <p><strong>Verifier:</strong> ${level.verifier}</p>
                <p>
                    <a href="https://youtube.com/watch?v=${level.youtube}"
                    target="_blank"
                    style="color:#ff7b00;">
                    Watch Showcase/Verification
                    </a>
                </p>
            </div>
        </div>
        `;
    });
}

function loadStats(){

    const table = document.getElementById("statsTable");

    players.forEach(player=>{

        table.innerHTML += `
        <tr>
            <td>#${player.rank}</td>
            <td>${player.name}</td>
            <td>${player.points}</td>
            <td>${player.demons}</td>
        </tr>
        `;
    });
}

function showPage(page){

    document.querySelectorAll(".page").forEach(p=>{
        p.classList.remove("active");
    });

    document.getElementById(page).classList.add("active");
}

loadDemons();
loadStats();

</script>

</body>
</html>
